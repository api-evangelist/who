aid: who
name: World Health Organization (WHO)
description: >
  The World Health Organization (WHO) is the United Nations specialized agency
  for international public health. WHO provides free public REST APIs giving
  programmatic access to global health statistics, disease surveillance data,
  immunization coverage, health indicators by country, and the International
  Classification of Diseases (ICD). The GHO OData API exposes hundreds of
  health indicators across all WHO member states with no authentication
  required, while the ICD API provides structured access to ICD-11 and ICD-10
  clinical classifications via OAuth 2 credentials obtained through free
  registration.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/who/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Health
  - Global Health
  - Disease Surveillance
  - Immunization
  - Health Statistics
  - ICD
  - WHO
  - United Nations
  - Open Data
apis:
  - name: WHO GHO OData API
    description: >
      The Global Health Observatory (GHO) OData API provides a query interface
      to WHO's global health data and statistics, covering hundreds of health
      indicators across all WHO member states and regions. No authentication is
      required. Supports OData filtering, field selection, and is compatible
      with Power BI.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.who.int/data/gho/info/gho-odata-api
    baseURL: https://ghoapi.azureedge.net/api
    tags:
      - Global Health Observatory
      - Health Indicators
      - OData
      - Open Data
    properties:
      - type: Documentation
        url: https://www.who.int/data/gho/info/gho-odata-api
      - type: OpenAPI
        url: https://ghoapi.azureedge.net/api/$metadata
  - name: WHO ICD API
    description: >
      The ICD API provides HTTP-based REST access to the International
      Classification of Diseases (ICD-11 and ICD-10), including the ICD-11
      Foundation Component and Linearizations. Requires free registration to
      obtain OAuth 2 client credentials. Supports multilingual responses,
      JSON-LD, and Swagger/OpenAPI documentation.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://icd.who.int/docs/icd-api
    baseURL: https://id.who.int/
    tags:
      - ICD-11
      - ICD-10
      - Disease Classification
      - Clinical
      - OAuth 2
    properties:
      - type: Documentation
        url: https://icd.who.int/docs/icd-api/APIDoc-Version2/
      - type: OpenAPI
        url: https://id.who.int/swagger/index.html
      - type: Authentication
        url: https://icdaccessmanagement.who.int/connect/token
